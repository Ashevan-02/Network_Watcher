version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: network-watcher-db
    environment:
      POSTGRES_DB: networkwatcher
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - network-watcher-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d networkwatcher"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Spring Boot Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: network-watcher-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/networkwatcher
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-admin123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: false
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this-in-production}
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-your-email@gmail.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-your-app-password}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - network-watcher-net
    restart: unless-stopped
    # Required for network scanning
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: network-watcher-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - network-watcher-net
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local

networks:
  network-watcher-net:
    driver: bridge
