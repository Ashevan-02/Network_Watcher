services:
  # PostgreSQL Database
  - type: pserv
    name: network-watcher-db
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: network-watcher-postgres
          property: connectionString
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: network-watcher-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update

  # Backend API
  - type: web
    name: network-watcher-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /api/test
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: network-watcher-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: false

  # Frontend
  - type: web
    name: network-watcher-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://network-watcher-backend.onrender.com

databases:
  - name: network-watcher-postgres
    plan: free
